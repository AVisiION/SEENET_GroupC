<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Chronix</title>
    <link rel="stylesheet" href="../Css/istyles.css">
    <link rel="stylesheet" href="../Css/styles.css">
    <link rel="stylesheet" href="../Css/login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>
<body>
    <div class="header">
        <div class="nav">
            <ul>
                <li class="search-nav-item">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <div class="search-inline">
                        <input type="text" placeholder="Search...">
                    </div>
                </li>
                <li><a href="wishlist.html" class="nav-icon-link"><i class="fa-solid fa-heart"></i></a></li>
                <li><a href="cart.html" class="nav-icon-link"><i class="fa-solid fa-cart-shopping"></i></a></li>
                <li>
                    <a href="login.html"><i class="fa-solid fa-user"></i></a>
                </li>
            </ul>
            <button class="menu-toggle" type="button" aria-label="Open sidebar" title="Open sidebar"
                aria-controls="sidebar" aria-expanded="false">
                <i class="fa-solid fa-bars"></i>
            </button>

            <a href="../index.html" class="nlogo">
                <span class="nlogo-text">CHR</span>
                <img src="../MEDIA/logo.png" alt="Chronix Logo">
                <span class="nlogo-text">NIX</span>
            </a>
        </div>
    </div>
    
    <div class="login-container">
        <div class="login-box">
            <div class="logo">
                <a href="../index.html">
                    <img src="../MEDIA/logo.png" alt="Chronix Logo" class="auth-logo">
                </a>
            </div>
            <h2>Welcome Back</h2>
            <form action="#">
                <div class="input-group">
                    <input type="email" placeholder="Enter Your E-mail" required>
                    <i class="fa-solid fa-envelope"></i>
                </div>
                <div class="input-group">
                    <input type="password" placeholder="Enter your password" required>
                    <i class="fa-solid fa-lock"></i>
                </div>
                
                <div class="form-actions">
                    <a href="#" class="forget">Forgot Password?</a>
                </div>
                
                <button type="submit" class="login-btn">LOGIN</button>
            </form>
            
            <div class="login-footer">
                Don't have an account?
                <a href="register.html" class="signup"> Sign Up</a>
            </div>
        </div>
    </div>
</body>
</html>
